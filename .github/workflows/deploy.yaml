name: CI/CD - Docker + EKS Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️⃣ Build & Push Docker Image (VERSIONED)
    - name: Build & Push Image
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: |
          hassanali1824/ecommercedevopsified:v${{ github.run_number }}

    # 4️⃣ Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 5️⃣ Connect to EKS cluster
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name devops-eks-cluster --region us-east-1

    # 6️⃣ Deploy new version to Kubernetes
    - name: Deploy to EKS
      run: |
        kubectl set image deployment/ecommerce-app ecommerce=hassanali1824/ecommercedevopsified:v${{ github.run_number }}

    # 7️⃣ Verify deployment rollout
    - name: Verify rollout
      run: |
        kubectl rollout status deployment/ecommerce-app