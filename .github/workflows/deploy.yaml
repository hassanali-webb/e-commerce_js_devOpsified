name: CI/CD - Docker Build & Deploy to EKS

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code (FIXED)
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: false
        fetch-depth: 0

    # 2️⃣ Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️⃣ Build & Push Docker Image
    - name: Build & Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          hassanali1824/ecommercedevopsified:v${{ github.run_number }}

    # 4️⃣ Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 5️⃣ Install kubectl (IMPORTANT FIX)
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # 6️⃣ Update kubeconfig (EKS access)
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name devops-eks-cluster --region us-east-1

    # 7️⃣ Deploy to Kubernetes
    - name: Deploy to EKS
      run: |
        kubectl set image deployment/ecommerce-app ecommerce=hassanali1824/ecommercedevopsified:v${{ github.run_number }}
        kubectl rollout status deployment/ecommerce-app

    # 8️⃣ Verify cluster state
    - name: Get pods
      run: kubectl get pods

    - name: Get services
      run: kubectl get svc